---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    </header>

    <div class="post-content">
        {% if page.coverImage %}
            <div class="post-cover-image">
                <img src="{{ page.coverImage }}" alt="{{ page.title }}" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px;">
            </div>
        {% endif %}
        {{ content }}
    </div>
</article>
